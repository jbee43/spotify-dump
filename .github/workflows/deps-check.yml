name: Check Dependencies

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for outdated direct dependencies
        id: deps
        run: |
          python3 << 'PYEOF'
          import json, subprocess

          with open("requirements.txt") as f:
              pinned = {
                  line.strip().split("==")[0].lower()
                  for line in f
                  if "==" in line.strip() and not line.strip().startswith("#")
              }

          result = subprocess.run(
              ["pip", "list", "--outdated", "--format=json"],
              capture_output=True, text=True,
          )
          outdated = [
              p for p in json.loads(result.stdout or "[]")
              if p["name"].lower() in pinned
          ]

          if outdated:
              for p in outdated:
                  print(f"  {p['name']}: {p['version']} -> {p['latest_version']}")
              summary = ", ".join(
                  f"{p['name']} {p['version']} -> {p['latest_version']}"
                  for p in outdated
              )
              with open("/tmp/deps_outdated.txt", "w") as f:
                  f.write(summary)
          else:
              print("All direct dependencies are up to date.")
          PYEOF

          if [ -f /tmp/deps_outdated.txt ]; then
            echo "outdated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify outdated dependencies
        if: steps.deps.outputs.outdated == 'true'
        env:
          NOTIFICATION_WEBHOOK_URL: ${{ secrets.NOTIFICATION_WEBHOOK_URL }}
        run: |
          [ -z "$NOTIFICATION_WEBHOOK_URL" ] && exit 0
          SUMMARY=$(cat /tmp/deps_outdated.txt)
          PAYLOAD=$(SUMMARY="$SUMMARY" python3 -c "import json,os; s=os.environ['SUMMARY']; print(json.dumps({'text':f'Outdated deps: {s}','content':f'Outdated deps: {s}'}))")
          curl -sf -X POST "$NOTIFICATION_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "Title: spotify-dump: Outdated Dependencies" \
            -d "$PAYLOAD"
